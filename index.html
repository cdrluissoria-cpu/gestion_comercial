    card4.appendChild(el('div', { style: 'display:flex;gap:8px;flex-wrap:wrap' },
      el('button', { class: 'btn btn-ghost', onclick: () => Configuracion.exportar() }, el('span', { html: Icons.download }), 'Exportar respaldo'),
      el('button', { class: 'btn btn-ghost', onclick: () => $('#importInput').click() }, el('span', { html: Icons.upload }), 'Importar respaldo'),
      el('input', { type: 'file', accept: '.json', id: 'importInput', style: 'display:none', onchange: e => Configuracion.importar(e.target.files[0]) }),
      el('button', { class: 'btn btn-danger', onclick: () => {
        confirmDialog('¿BORRAR TODOS LOS DATOS de este negocio? Esta acción no se puede deshacer.', () => {
          DB.wipe();
          Config = JSON.parse(JSON.stringify(DefaultConfig));
          saveConfig();
          location.reload();
        });
      }}, el('span', { html: Icons.trash }), 'Borrar todo')
    ));
    card4.appendChild(el('div', { style: 'margin-top:12px;padding:10px;background:var(--surface-2);border-radius:8px;font-size:12px;color:var(--text-muted)' },
      el('div', {}, 'Identificador del negocio (tenant): ', el('code', {}, DB.tenantId)),
      el('div', { style: 'margin-top:4px' }, 'Cambiá este identificador en la URL con ?tenant=NOMBRE para tener bases separadas para distintos clientes.')
    ));
    root.appendChild(card4);

    // Wire events
    setTimeout(() => {
      $('#logoInput').addEventListener('change', e => {
        const f = e.target.files[0]; if (!f) return;
        const reader = new FileReader();
        reader.onload = () => {
          Config.negocio.logo = reader.result;
          saveConfig();
          navigate('config');
          toast('Logo actualizado', 'success');
        };
        reader.readAsDataURL(f);
      });
      $('#cfg-save').addEventListener('click', () => {
        Config.negocio.nombre = $('#cfg-nombre').value.trim() || 'Mi Negocio';
        Config.negocio.telefono = $('#cfg-tel').value.trim();
        Config.negocio.cuit = $('#cfg-cuit').value.trim();
        Config.negocio.direccion = $('#cfg-dir').value.trim();
        saveConfig();
        toast('Datos guardados', 'success');
      });
    }, 0);

    return root;
  },

  exportar() {
    const data = DB.exportAll();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `respaldo_${DB.tenantId}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  },

  importar(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        confirmDialog('Esto reemplazará todos los datos actuales. ¿Continuar?', () => {
          DB.importAll(data);
          if (data.config) Config = data.config;
          location.reload();
        });
      } catch(e) { toast('Archivo inválido', 'danger'); }
    };
    reader.readAsText(file);
  }
};

/* ============================================================
   6. NAVEGACIÓN / ROUTER
   ============================================================ */
const NAV_ITEMS = [
  { id: 'dashboard', label: 'Inicio', icon: 'dashboard', module: Dashboard, alwaysVisible: true, mobilePriority: true },
  { id: 'productos', label: 'Productos', icon: 'box', module: Productos, mobilePriority: true },
  { id: 'ventas', label: 'Vender', icon: 'cart', module: Ventas, mobilePriority: true },
  { id: 'historial', label: 'Historial', icon: 'chart', module: Historial, parent: 'ventas' },
  { id: 'clientes', label: 'Clientes', icon: 'users', module: Clientes },
  { id: 'compras', label: 'Compras', icon: 'truck', module: Compras },
  { id: 'caja', label: 'Caja', icon: 'cash', module: Caja, mobilePriority: true },
  { id: 'reportes', label: 'Reportes', icon: 'chart', module: Reportes },
  { id: 'config', label: 'Ajustes', icon: 'settings', module: Configuracion, alwaysVisible: true }
];

function buildNav() {
  const nav = $('#nav');
  nav.innerHTML = '';
  NAV_ITEMS.filter(i => !i.parent && (i.alwaysVisible || Config.modulos[i.id])).forEach(item => {
    const btn = el('button', {
      class: 'nav-item ' + (item.mobilePriority ? 'nav-primary' : 'nav-secondary'),
      'data-id': item.id,
      onclick: () => navigate(item.id)
    },
      el('span', { html: Icons[item.icon] }),
      el('span', {}, item.label)
    );
    nav.appendChild(btn);
  });
  // Botón "Más" — solo visible en mobile, abre las opciones secundarias
  const masBtn = el('button', {
    class: 'nav-item nav-mas',
    onclick: () => openMoreMenu()
  },
    el('span', { html: Icons.more }),
    el('span', {}, 'Más')
  );
  nav.appendChild(masBtn);
}

/**
 * Abre el menú "Más" en mobile con los módulos secundarios
 * (Clientes, Compras, Historial, Reportes, Ajustes).
 */
function openMoreMenu() {
  const items = NAV_ITEMS.filter(i =>
    !i.parent &&
    !i.mobilePriority &&
    (i.alwaysVisible || Config.modulos[i.id])
  );
  const grid = el('div', { style: 'display:grid;grid-template-columns:1fr 1fr;gap:10px' });
  items.forEach(item => {
    const card = el('button', {
      class: 'btn btn-ghost',
      style: 'flex-direction:column;height:auto;padding:18px 12px;gap:8px;font-size:13px',
      onclick: () => { backdrop.remove(); navigate(item.id); }
    },
      el('span', { html: Icons[item.icon], style: 'width:24px;height:24px;display:block' }),
      el('span', {}, item.label)
    );
    grid.appendChild(card);
  });
  const { modal: m, body, close } = modal({
    title: 'Más opciones',
    body: grid
  });
  const backdrop = m.parentElement;
}

function navigate(id) {
  const item = NAV_ITEMS.find(i => i.id === id);
  if (!item) return;
  // Marcar activo en sidebar
  $$('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.id === (item.parent || item.id)));
  // Renderizar
  const content = $('#content');
  content.innerHTML = '';
  content.appendChild(item.module.render());
  // Cerrar el drawer si está abierto (mobile)
  toggleDrawer(false);
  // Guardar en URL (sin reload) para volver más fácil.
  // try/catch porque algunos entornos con sandbox (vistas previas, iframes)
  // no permiten modificar la URL. Si falla, el sistema sigue funcionando igual.
  try { history.replaceState(null, '', '#' + id); } catch(e) { /* entorno sandbox: ignorar */ }
}

/**
 * Abre o cierra el drawer mobile (panel lateral).
 * Si no se pasa parámetro, alterna el estado actual.
 */
function toggleDrawer(open) {
  const sidebar = $('#sidebar');
  if (!sidebar) return;
  let backdrop = $('#drawerBackdrop');
  if (!backdrop) {
    backdrop = el('div', {
      id: 'drawerBackdrop',
      class: 'drawer-backdrop',
      onclick: () => toggleDrawer(false)
    });
    document.body.appendChild(backdrop);
  }
  if (open === undefined) open = !sidebar.classList.contains('drawer-open');
  sidebar.classList.toggle('drawer-open', open);
  backdrop.classList.toggle('open', open);
}

/* ============================================================
   7. BRANDING (logo / nombre dinámico)
   ============================================================ */
function applyBranding() {
  $('#brandName').textContent = Config.negocio.nombre || 'Mi Negocio';
  document.title = Config.negocio.nombre + ' · Gestión';
  const logoEl = $('#brandLogo');
  const topbarLogoEl = $('#topbarLogo');
  const topbarNameEl = $('#topbarName');
  const inicial = (Config.negocio.nombre || 'M').charAt(0).toUpperCase();
  if (Config.negocio.logo) {
    logoEl.style.backgroundImage = `url('${Config.negocio.logo}')`;
    logoEl.textContent = '';
    if (topbarLogoEl) {
      topbarLogoEl.style.backgroundImage = `url('${Config.negocio.logo}')`;
      topbarLogoEl.textContent = '';
    }
  } else {
    logoEl.style.backgroundImage = '';
    logoEl.textContent = inicial;
    if (topbarLogoEl) {
      topbarLogoEl.style.backgroundImage = '';
      topbarLogoEl.textContent = inicial;
    }
  }
  if (topbarNameEl) topbarNameEl.textContent = Config.negocio.nombre || 'Mi Negocio';
}

/* ============================================================
   8. INICIALIZACIÓN
   ============================================================ */
function init() {
  // Multi-tenant via URL: ?tenant=miCliente
  const params = new URLSearchParams(location.search);
  if (params.get('tenant')) DB.setTenant(params.get('tenant'));
  Config = DB.getConfig() || JSON.parse(JSON.stringify(DefaultConfig));
  if (!DB.getConfig()) saveConfig();

  applyBranding();
  buildNav();

  // Conectar el botón hamburguesa de la topbar mobile
  const menuBtn = $('#topbarMenuBtn');
  if (menuBtn) menuBtn.addEventListener('click', () => toggleDrawer());

  // Ruta inicial desde el hash o dashboard
  const hash = location.hash.slice(1);
  navigate(hash && NAV_ITEMS.find(i => i.id === hash) ? hash : 'dashboard');

  // Atajos de teclado
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === '/') { e.preventDefault(); navigate('ventas'); }
    if (e.key === 'Escape') toggleDrawer(false);
  });
}

init();
</script>
